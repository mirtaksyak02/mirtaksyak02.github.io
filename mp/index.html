<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARETENOR</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div class="player-container">
        <h1 id="page-title">RARETENOR</h1>
        
        <div id="search-container" class="search-row-container">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="Поиск">
            </div>
            <button id="shuffle-all-btn" class="shuffle-main-btn" title="Перемешать и включить всё">&#8644;</button>
        </div>
        
        <!-- <h1 id="page-title">Популярные релизы</h1> -->
        <!-- Кнопка назад (скрыта по умолчанию) -->
        <button id="back-btn" class="back-btn" style="display: none;">← Назад к альбомам</button>
        
        <!-- Шапка открытого альбома (скрыта по умолчанию) -->
        <div id="album-header" class="album-header" style="display: none;"></div>
        
        <!-- Вывод сетки альбомов, либо список треков для JS -->
        <div id="content-area"></div>
    </div>

<div class="bottom-controls">
    <!-- Скрытый плеер -->
    <audio id="main-audio"></audio>

    <!-- Таймлайн времени -->
    <div class="progress-container">
        <span id="current-time">0:00</span>
        <div class="custom-slider-track">
            <div id="custom-progress-fill" class="custom-progress-fill">
                <div class="custom-thumb"></div>
            </div>
        </div>
        <input type="range" id="progress-bar" value="0" max="100">
        <span id="total-time">0:00</span>
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ ЭЛЕМЕНТОВ УПРАВЛЕНИЯ -->
    <div class="player-controls-wrapper">
        
        <!-- Название трека по центру -->
        <div class="now-playing-container">
            <div id="now-playing">Выберите трек для воспроизведения</div>
        </div>
        
        <!-- Контейнер репита -->
        <div class="repeat-container">
            <button id="repeat-btn" class="repeat-icon repeat-off">⟳</button>
        </div>
        
        <!-- Кнопки управления -->
        <div class="control-buttons">    
            <button id="prev-btn" class="ctrl-btn">⏮</button>
            <button id="master-play-btn" class="ctrl-btn play-main">▶</button>
            <button id="next-btn" class="ctrl-btn">⏭</button>
        </div>

        <!-- Контейнер громкости -->
        <div class="volume-container">
            <!-- Иконка динамика -->
            <button id="volume-toggle-btn" class="volume-toggle-btn">〣</button>
            
            <!-- Мобильная вертикальная капсула громкости -->
            <div id="mobile-volume-popup" class="mobile-volume-popup">
                <div id="mobile-volume-track" class="mobile-track">
                    <div id="mobile-volume-fill" class="mobile-fill">
                        <div class="mobile-thumb"></div>
                    </div>
                </div>
            </div>

            <!-- Десктопная горизонтальная громкость для ПК -->
            <div class="pc-volume-wrapper">
                <div class="custom-volume-track">
                    <div id="custom-volume-fill" class="custom-volume-fill">
                        <div class="custom-volume-thumb"></div>
                    </div>
                </div>
                <input type="range" id="volume-bar" min="0" max="100" value="70">
            </div>
        </div>
    </div>
</div>

    <script src="mp-script.js"></script>
</body>
</html>
