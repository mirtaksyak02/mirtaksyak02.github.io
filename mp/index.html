<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARETENOR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="player-container">
        <h1 id="page-title">RARETENOR</h1>
        <!-- <h1 id="page-title">Популярные релизы</h1> -->
        <!-- Кнопка назад (скрыта по умолчанию) -->
        <button id="back-btn" class="back-btn" onclick="showAlbumsGrid()" style="display: none;">← Назад к альбомам</button>
        
        <!-- Шапка открытого альбома (скрыта по умолчанию) -->
        <div id="album-header" class="album-header" style="display: none;"></div>
        
        <!-- Вывод сетки альбомов, либо список треков для JS -->
        <div id="content-area"></div>
    </div>

    <div class="bottom-controls">
        <audio id="main-audio" controls></audio>
        <div id="now-playing">Выберите трек для воспроизведения</div>
    </div>

    <script src="mp-script.js"></script>
</body>
</html>
