<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARETENOR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="player-container">
        <h1 id="page-title">RARETENOR</h1>
        <!-- <h1 id="page-title">Популярные релизы</h1> -->
        <!-- Кнопка назад (скрыта по умолчанию) -->
        <button id="back-btn" class="back-btn" onclick="showAlbumsGrid()" style="display: none;">← Назад к альбомам</button>
        
        <!-- Шапка открытого альбома (скрыта по умолчанию) -->
        <div id="album-header" class="album-header" style="display: none;"></div>
        
        <!-- Вывод сетки альбомов, либо список треков для JS -->
        <div id="content-area"></div>
    </div>

<div class="bottom-controls">
    <!-- Скрытый плеер, который просто воспроизводит звук в фоне -->
    <audio id="main-audio"></audio>
    <div id="now-playing">Выберите трек для воспроизведения</div>

<div class="player-interface">
    <!-- Кнопки управления -->
    <div class="control-buttons">
        <button id="prev-btn" class="ctrl-btn">⏮</button>
        <button id="master-play-btn" class="ctrl-btn play-main">▶</button>
        <button id="next-btn" class="ctrl-btn">⏭</button>
    </div>

    <!-- Ползунок времени и громкость в одну линию -->
    <div class="controls-row">
        <!-- Таймлайн времени -->
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" max="100">
            <span id="total-time">0:00</span>
        </div>

        <!-- Контроль громкости -->
        <div class="volume-container">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volume-bar" min="0" max="100" value="70">
        </div>
    </div>
</div>

        <!-- Ползунок времени -->
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" max="100">
            <span id="total-time">0:00</span>
        </div>
    </div>
</div>

    <script src="mp-script.js"></script>
</body>
</html>
